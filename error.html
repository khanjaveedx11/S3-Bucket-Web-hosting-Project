<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oops! Page Not Found</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    color:white;
    text-align:center;
}

.container{
    max-width:600px;
    padding:40px;
}

h1{
    font-size:120px;
    color:#38bdf8;
}

h2{
    font-size:32px;
    margin-bottom:20px;
}

p{
    color:#cbd5e1;
    font-size:18px;
    line-height:1.6;
    margin-bottom:30px;
}

.btn{
    display:inline-block;
    padding:15px 30px;
    background:#0ea5e9;
    color:white;
    text-decoration:none;
    border-radius:30px;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    transform:translateY(-5px);
    background:#0284c7;
}

.emoji{
    font-size:60px;
    margin-bottom:20px;
}
</style>
</head>

<body>

<div class="container">

    <div class="emoji">😔</div>

    <h1>404</h1>

    <h2>Sorry, Page Not Found</h2>

    <p>
        We couldn't find the page you're looking for.
        The page may have been moved, deleted, or the URL might be incorrect.
    </p>

    <a href="index.html" class="btn">
        🏠 Go Back Home
    </a>

</div>

</body>
</html>
